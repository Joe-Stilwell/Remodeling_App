<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Dashboard</title>

    <link href="./css/output.css" rel="stylesheet" />
  </head>

  <body
    class="flex h-screen w-screen flex-col overflow-hidden border-t-2 border-brand-primary bg-brand-tint font-sans"
  >
    <header class="app-header shrink-0 shadow-soft-sm">
      <div class="side-tower">
        <div
          class="text-center text-xl font-bold text-brand-primary select-none"
        >
          Company<br />Logo
        </div>
      </div>

      <div class="flex h-header-top items-center justify-center">
        <h1
          class="text-3xl leading-none font-light tracking-tight text-brand-orange select-none"
        >
          Company Name
        </h1>
      </div>

      <div class="side-tower">
        <div
          class="text-center text-xs leading-tight font-bold text-brand-primary uppercase select-none"
        >
          Contractor<br />Advantage
        </div>
      </div>

      <div class="col-start-2 flex h-header-bottom items-center">
        <div
          class="flex h-header-bottom w-full items-center gap-6 bg-brand-primary px-4 shadow-soft-md"
        >
          <div
            class="search-container group my-1 ml-6 flex h-[26px] items-center rounded-sm border border-transparent px-2 transition-all focus-within:border-brand-orange hover:border-brand-orange"
          >
            <span
              class="mr-2 text-[9px] font-extrabold text-slate-400 uppercase transition-colors group-focus-within:text-brand-orange"
            >
              Search
            </span>
            <input
              id="global-search"
              type="text"
              placeholder="Name, Company, or Address"
              class="w-[240px] bg-transparent text-[11px] text-white outline-none placeholder:text-slate-300"
            />
          </div>
          <div class="text-sm font-medium text-white select-none">
            Activity Bar
          </div>
        </div>
      </div>
    </header>
    <div class="flex flex-1 overflow-hidden">
  <aside
    id="left-sidebar"
    class="flex w-sidebar-w shrink-0 flex-col bg-brand-primary"
  >
    <div
      class="group flex h-nav-item-h cursor-pointer items-center justify-end px-4 transition-colors hover:bg-white/10"
      onclick="toggleSidebar()"
    >
      <div id="hamburger-icon" class="flex w-5 flex-col gap-1">
        <span class="h-0.5 w-full bg-white transition-all group-hover:shadow-[0_0_8px_white]"></span>
        <span class="h-0.5 w-full bg-white transition-all group-hover:shadow-[0_0_8px_white]"></span>
        <span class="h-0.5 w-full bg-white transition-all group-hover:shadow-[0_0_8px_white]"></span>
      </div>
    </div>

    <nav class="flex-1 pt-2">
      <div
        class="nav-item nav-item-primary text-white"
        onclick="setActive(this)"
      >
        <div class="active-bar"></div>
        <span>Home</span>
      </div>
          <div class="mt-1 space-y-0">
            <div class="nav-item nav-item-secondary" onclick="setActive(this)">
              <div class="active-bar"></div>
              <span>Phone Book</span>
              <div class="submenu">
                <div class="sub-tab" onclick="setSubActive(this)">
                  <div class="active-bar"></div>
                  <span>Rolodex</span>
                </div>
                <div class="sub-tab" onclick="setSubActive(this)">
                  <div class="active-bar"></div>
                  <span>New Client</span>
                </div>
                <div class="sub-tab" onclick="setSubActive(this)">
                  <div class="active-bar"></div>
                  <span>New Vendor</span>
                </div>
                <div class="sub-tab" onclick="setSubActive(this)">
                  <div class="active-bar"></div>
                  <span>New Employee</span>
                </div>
              </div>
            </div>
            <div class="nav-item nav-item-secondary" onclick="setActive(this)">
              <div class="active-bar"></div>
              <span>Work Order</span>
            </div>
            <div class="nav-item nav-item-secondary" onclick="setActive(this)">
              <div class="active-bar"></div>
              <span>Estimating</span>
            </div>
            <div class="nav-item nav-item-secondary" onclick="setActive(this)">
              <div class="active-bar"></div>
              <span>Scheduling</span>
            </div>
            <div class="nav-item nav-item-secondary" onclick="setActive(this)">
              <div class="active-bar"></div>
              <span>Reports</span>
            </div>
          </div>
        </nav>
        <div class="pb-4">
          <div class="nav-item nav-item-secondary" onclick="setActive(this)">
            <div class="active-bar"></div>
            <span>Settings</span>
          </div>
          <div class="nav-item nav-item-secondary" onclick="setActive(this)">
            <div class="active-bar"></div>
            <span>Help</span>
          </div>
        </div>
      </aside>
      <main
        id="main-content"
        class="bg-blue-tint relative flex-1 overflow-hidden shadow-inner"
      >
        <div
          class="pointer-events-none absolute inset-0 opacity-[0.05]"
          style="
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 30px 30px;
          "
        ></div>
      </main>
      <aside
        class="w-[160px] shrink-0 overflow-y-auto border-l border-slate-200 bg-brand-tint p-4"
      >
        <div
          class="mb-4 text-center text-[10px] font-bold tracking-widest text-brand-primary uppercase opacity-50 select-none"
        >
          Widget Dock
        </div>
        <div id="widget-dock" class="flex flex-col items-center gap-3"></div>
      </aside>
    </div>
    <footer
      class="z-50 flex h-[25px] w-full shrink-0 items-center bg-slate-600 px-4 text-[10px] text-white"
    >
      <span class="mr-2 h-2 w-2 animate-pulse rounded-full bg-green-400"></span>
      System Ready
    </footer>
    <script src="js/shell.js"></script>
    <script src="js/widget-logic.js"></script>
  </body>
</html>
