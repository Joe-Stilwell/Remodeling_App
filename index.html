<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remodeling App V2</title>
    <link rel="stylesheet" href="css/output.css?v=59" />
  </head>
  <body class="app-layout bg-brand-tint font-sans text-ink-dark antialiased">

    <div class="top-accent-bar"></div>

    <!-- Fixed Header Row: spans full width, never reflows -->
    <div class="app-header-row">

      <div class="header-flank bg-white">
        <span class="text-center text-[10px] leading-tight font-black text-ink-dark uppercase">Company<br />Logo</span>
      </div>

      <header class="app-header">
        <div class="header-top">
          <h1 class="text-3xl font-semibold tracking-tight text-ink-dark">Company Name</h1>
        </div>
        <div class="header-sub">
          <div class="search-container flex items-center rounded bg-white px-3 shadow-sm">
            <span class="search-label text-[10px] font-black text-brand-primary uppercase">Search</span>
            <input
              id="universal-search"
              type="search"
              class="search-input w-full bg-transparent text-[14px] outline-none"
              placeholder="Search..."
              autocomplete="off"
            />
          </div>
          <div class="flex-1 text-center text-[10px] font-bold tracking-[0.4em] text-white uppercase">
            Activity Bar
          </div>
        </div>
      </header>

      <div class="header-flank bg-white">
        <span class="text-center text-[16px] leading-tight font-black text-ink-dark uppercase">Contractor<br />Advantage</span>
      </div>

    </div>

    <!-- Body Row: sidebar collapses independently -->
    <div class="app-body">

      <!-- Left Navigation Sidebar -->
      <aside id="nav-sidebar" class="sidebar-column bg-brand-dark">
        <nav class="flex flex-1 flex-col">
          <div id="hamburger" class="hamburger-wrapper">
            <div class="hamburger-box">
              <div class="hamburger-line"></div>
              <div class="hamburger-line"></div>
              <div class="hamburger-line"></div>
            </div>
          </div>
          <ul>
            <li><a href="#" class="menu-item" data-nav="home">Home</a></li>
            <li class="menu-sub-item"><a href="#" class="menu-item" data-submenu="phonebook">Contacts</a></li>
            <li class="menu-sub-item"><a href="#" class="menu-item" data-submenu="workorder">Work Order</a></li>
            <li class="menu-sub-item"><a href="#" class="menu-item" data-submenu="estimating">Estimating</a></li>
          </ul>
          <div class="flex-1"></div>
          <div class="nav-footer">
            <ul class="pt-2">
              <li class="menu-sub-item"><a href="#" class="menu-item" data-submenu="settings">Settings</a></li>
              <li class="menu-sub-item"><a href="#" class="menu-item" data-submenu="help">Help</a></li>
            </ul>
          </div>
        </nav>
      </aside>

      <!-- Workspace -->
      <main class="workspace">
        <div class="flex h-full items-center justify-center text-xs font-bold tracking-widest text-slate-400 uppercase">
          Workspace Area
        </div>
      </main>

      <!-- Right Widget Sidebar -->
      <aside id="dock-sidebar" class="sidebar-column bg-brand-tint">
        <div class="dock-resize-handle"></div>
        <div class="widget-area">
          <div class="dock-label">Widget Dock</div>
          <div class="widget-dock-icons"></div>
        </div>
      </aside>

    </div>

    <footer class="status-bar">
      <div class="flex-1">System Ready</div>
      <div>v1.0.0 Build</div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/crm.js"></script>
    <script src="js/estimating.js"></script>
    <script src="js/shell.js"></script>
  </body>
</html>
