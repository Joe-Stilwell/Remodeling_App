<!doctype html>
<html lang="en" style="height: 100%; margin: 0; padding: 0">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remodeling App V2</title>
    <link rel="stylesheet" href="css/output.css" />
    <style>
      /* --- 1. STRUCTURAL RULES (The "Iron-Clad" Silo) --- */
      * {
        box-sizing: border-box;
      }

      .sidebar-column {
        width: 165px;
        min-width: 165px;
        flex: 0 0 165px;
        display: flex;
        flex-direction: column;
        height: 100%;
        border: none !important;
      }

      /* --- 3. UI ELEMENTS (Hamburger & Status) --- */
      .hamburger-box {
        width: 24px;
        height: 18px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
      }
      .hamburger-line {
        height: 2px;
        width: 100%;
        background-color: white;
      }

      .status-bar {
        height: 20px;
        background-color: #1e293b;
        color: rgba(255, 255, 255, 0.5);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        padding: 0 16px;
        flex-shrink: 0;
      }

      .widget-area {
        padding: 12px;
        flex: 1;
        border: none !important;
      }
    </style>
  </head>
  <body
    class="bg-brand-tint font-sans text-ink-dark antialiased"
    style="
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    "
  >
    <div
      style="
        height: 2px;
        width: 100%;
        flex-shrink: 0;
        background-color: #006496;
      "
    ></div>

    <div style="flex: 1; display: flex; width: 100%; overflow: hidden">
      <aside class="sidebar-column bg-brand-primary">
        <div
          style="height: 105px"
          class="flex shrink-0 items-center justify-center border-b border-slate-200 bg-white"
        >
          <span
            class="text-center text-[10px] leading-tight font-black text-brand-primary uppercase"
            >Company<br />Logo</span
          >
        </div>
        <nav style="flex: 1; display: flex; flex-direction: column">
          <div
            style="padding: 12px 16px; display: flex; justify-content: flex-end"
          >
            <div class="hamburger-box">
              <div class="hamburger-line"></div>
              <div class="hamburger-line"></div>
              <div class="hamburger-line"></div>
            </div>
          </div>

          <ul>
            <li><a href="#" class="menu-item">Home</a></li>

            <li class="menu-sub-item">
              <a href="#" class="menu-item">Phone Book</a>
            </li>
            <li class="menu-sub-item">
              <a href="#" class="menu-item">Work Order</a>
            </li>
            <li class="menu-sub-item">
              <a href="#" class="menu-item">Estimating</a>
            </li>
          </ul>

          <div style="flex: 1"></div>
          <div style="padding-bottom: 12px">
            <ul style="padding-top: 8px">
              <li class="menu-sub-item">
                <a href="#" class="menu-item">Settings</a>
              </li>
              <li class="menu-sub-item">
                <a href="#" class="menu-item">Help</a>
              </li>
            </ul>
          </div>
        </nav>
      </aside>

      <div style="flex: 1; display: flex; flex-direction: column; min-width: 0">
        <header style="height: 105px; flex-shrink: 0" class="flex flex-col">
          <div
            style="height: 70px"
            class="flex items-center justify-center bg-white"
          >
            <h1
              class="text-3xl font-semibold tracking-tight text-brand-primary"
              style="margin: 0; padding: 0; line-height: 1"
            >
              Company Name
            </h1>
          </div>
          <div style="height: 35px" class="flex items-center bg-brand-primary">
            <div
              style="margin-left: 16px; height: 28px; width: 350px"
              class="search-container flex items-center rounded bg-white px-3 shadow-sm"
            >
              <span
                style="margin-left: 8px"
                class="search-label text-[10px] font-black text-brand-primary uppercase"
                >Search</span
              >
              <input
                id="universal-search"
                type="text"
                style="padding-left: 10px"
                class="search-input w-full bg-transparent text-[14px] outline-none"
                placeholder="Search..."
              />
            </div>
            <div
              class="flex-1 text-center text-[10px] font-bold tracking-[0.4em] text-white uppercase"
            >
              Activity Bar
            </div>
          </div>
        </header>
        <main
          style="flex: 1; overflow-y: auto; border-right: 1px solid #cbd5e1"
          class="bg-slate-50 p-8"
        >
          <div
            style="height: 100%"
            class="flex items-center justify-center text-xs font-bold tracking-widest text-slate-400 uppercase"
          >
            Workspace Area
          </div>
        </main>
      </div>

      <aside class="sidebar-column bg-brand-tint" style="border: none">
        <div
          style="height: 105px"
          class="flex shrink-0 items-center justify-center bg-white"
        >
          <span
            class="text-center text-[16px] leading-tight font-black text-brand-primary uppercase"
            >Contractor<br />Advantage</span
          >
        </div>
        <div class="widget-area">
          <div
            style="
              text-align: center;
              font-size: 9px;
              font-weight: 900;
              letter-spacing: 0.1em;
              color: #006496;
              text-transform: uppercase;
            "
          >
            Widget Dock
          </div>
        </div>
      </aside>
    </div>

    <footer class="status-bar">
      <div style="flex: 1">System Ready</div>
      <div style="flex: none">v2.0.4 Build</div>
    </footer>

    
    <script>
      /*Universal Search Function */
  const searchInput = document.getElementById('universal-search');
  searchInput.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      const query = event.target.value.trim();
      if (query) {
        console.log("Searching for:", query);
        event.target.value = '';
        event.target.blur();
        alert("Searching for: " + query); 
      }
    }
  });
</script>
  </body>
</html>
