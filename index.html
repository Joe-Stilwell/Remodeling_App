<!doctype html>
<html lang="en" style="height: 100%; margin: 0; padding: 0;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remodeling App V2</title>
    <link rel="stylesheet" href="css/output.css" />
    <style>
      /* THE RULEBOOK */
      * { box-sizing: border-box; }

      .sidebar-column {
        width: 165px;
        min-width: 165px;
        flex: 0 0 165px;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .menu-item {
        padding: 3px 16px 3px 32px;
        cursor: pointer;
        font-size: 18px;
        color: white;
        transition: background-color 0.2s;
      }
      .menu-item:hover { background-color: rgba(255, 255, 255, 0.1); }

      .hamburger-box {
        width: 24px;
        height: 18px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        cursor: pointer;
      }
      .hamburger-line {
        height: 2px;
        width: 100%;
        background-color: white;
      }

      .status-bar {
        height: 20px;
        background-color: #1e293b;
        color: rgba(255, 255, 255, 0.5);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        padding: 0 16px;
        flex-shrink: 0;
      }

      /* Clean Widget Dock */
      .widget-area {
        padding: 12px;
        flex: 1;
        border: none !important;
      }
    </style>
  </head>
  <body class="bg-brand-tint font-sans text-ink-dark antialiased" style="height: 100%; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column;">
    
  <div style="height: 2px; width: 100%; flex-shrink: 0; background-color: #006699;"></div>

  <div style="flex: 1; display: flex; width: 100%; overflow: hidden;">
    
    <div class="sidebar-column bg-brand-primary text-white">
      <div style="height: 105px; flex-shrink: 0;" class="flex items-center justify-center border-b border-slate-100 bg-white">
        <span class="text-center text-[10px] leading-tight font-black text-brand-primary uppercase">Company<br />Logo</span>
      </div>
      <nav style="flex: 1; display: flex; flex-direction: column;">
        <div style="padding: 8px 16px; display: flex; justify-content: flex-end; flex-shrink: 0;">
          <div class="hamburger-box">
            <div class="hamburger-line"></div><div class="hamburger-line"></div><div class="hamburger-line"></div>
          </div>
        </div>
        <div style="padding: 3px 16px; font-size: 18px; flex-shrink: 0;">Home</div>
        <ul style="margin: 0; padding: 0; list-style: none;">
          <li class="menu-item">Phone Book</li>
          <li class="menu-item">Work Order</li>
          <li class="menu-item">Estimating</li>
        </ul>
        
        <div style="flex: 1;"></div> 

        <div style="padding-bottom: 12px; border-top: 1px solid rgba(255,255,255,0.1);">
          <ul style="margin: 0; padding: 8px 0 0 0; list-style: none;">
            <li class="menu-item">Settings</li>
            <li class="menu-item">Help</li>
          </ul>
        </div>
      </nav>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; min-width: 0;" class="bg-white border-x border-slate-200">
      <header style="height: 105px; flex-shrink: 0;" class="flex flex-col border-b border-slate-200">
        <div style="height: 70px; flex-shrink: 0;" class="flex items-center justify-center bg-white">
          <h1 class="text-3xl font-semibold tracking-tight text-brand-primary" style="margin: 0; padding: 0; line-height: 1;">Company Name</h1>
        </div>
        <div style="height: 35px; flex-shrink: 0;" class="flex items-center bg-brand-primary px-4">
          <div class="flex h-6 w-48 flex-none items-center rounded bg-white px-2 shadow-sm">
            <span class="mr-2 text-[9px] font-black text-brand-primary uppercase">Search</span>
            <input type="text" class="w-full text-[11px] outline-none" placeholder="Search...">
          </div>
          <div class="flex-1 text-center text-[10px] font-bold tracking-[0.4em] text-white uppercase">Activity Bar</div>
        </div>
      </header>
      <main style="flex: 1; overflow-y: auto;" class="bg-slate-50 p-8">
        <div style="height: 100%;" class="flex items-center justify-center rounded-xl border-2 border-dashed border-slate-200 text-xs font-bold tracking-widest text-slate-400 uppercase">
          Workspace Area
        </div>
      </main>
    </div>

    <div class="sidebar-column bg-brand-header">
      <div style="height: 105px; flex-shrink: 0;" class="flex items-center justify-center bg-white">
        <span class="text-center text-[10px] leading-tight font-black text-brand-primary uppercase">Contractor<br />Advantage</span>
      </div>
      <div class="widget-area">
        <div style="text-align: center; font-size: 9px; font-weight: 900; letter-spacing: 0.1em; color: #006699; text-transform: uppercase;">
          Widget Dock
        </div>
      </div>
    </div>

  </div> <footer class="status-bar">
    <div style="flex: 1;">System Ready</div>
    <div style="flex: none;">v2.0.4 Build</div>
  </footer>

</body>
